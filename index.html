<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>股票損益計算器</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    margin-top:50px;
}

input{
    margin:5px;
    padding:8px;
}

button{
    padding:10px 20px;
}

#result{
    margin-top:20px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>股票損益計算器</h1>

<input id="buy" type="number" placeholder="買入價格"><br>

<input id="sell" type="number" placeholder="賣出價格"><br>

<input id="qty" type="number" placeholder="股數"><br>

<button onclick="calculate()">
計算
</button>

<div id="result"></div>

<script>

function calculate(){

    let buy =
    parseFloat(document.getElementById("buy").value);

    let sell =
    parseFloat(document.getElementById("sell").value);

    let qty =
    parseInt(document.getElementById("qty").value);

    let buyAmount = buy * qty;
    let sellAmount = sell * qty;

    let buyFee =
    Math.floor(buyAmount * 0.001425);

    let sellFee =
    Math.floor(sellAmount * 0.001425);

    let tax =
    Math.floor(sellAmount * 0.003);

    let profit =
    sellAmount - sellFee - tax
    - buyAmount - buyFee;

    document.getElementById("result")
    .innerHTML =
    "損益：" + profit.toFixed(0) + " 元";

}

</script>

</body>
</html>
